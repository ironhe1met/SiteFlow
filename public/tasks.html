<!-- ═══════════════════════════════════════════
     public/tasks.html  —  Публічний список задач
════════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Список задач</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-wrap">
  <div style="max-width:700px;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h1 style="font-size:20px;font-weight:500">Всі задачі</h1>
      <a href="/" class="btn btn-primary" style="font-size:13px;padding:7px 16px">+ Нова задача</a>
    </div>
    <div id="list"><p class="muted">Завантаження...</p></div>
  </div>
</div>
<script>
const STATUSES = {
  new:         { label: 'Нова',          color: '#888' },
  in_progress: { label: 'В роботі',     color: '#378ADD' },
  review:      { label: 'На перевірці',  color: '#BA7517' },
  done:        { label: 'Виконано',     color: '#1D9E75' },
};
const TYPE_LABELS = { new_page:'Нова сторінка', edit_page:'Редагування', publication:'Публікація' };

fetch('/api/tasks').then(r=>r.json()).then(({tasks})=>{
  const el = document.getElementById('list');
  if (!tasks.length) { el.innerHTML='<p class="muted">Задач поки немає</p>'; return; }
  el.innerHTML = tasks.map(t => {
    const s = STATUSES[t.status]||STATUSES.new;
    return `
    <a class="task-row" href="/task/${t.id}" style="text-decoration:none">
      <div class="task-row-left">
        <span class="type-tag">${TYPE_LABELS[t.type]||t.type}</span>
        <span class="task-row-title">${t.title}</span>
      </div>
      <div class="task-row-right">
        <span class="small muted">${new Date(t.created_at).toLocaleDateString('uk-UA')}</span>
        <span class="status-badge" style="background:${s.color}22;color:${s.color};border:0.5px solid ${s.color}55">${s.label}</span>
      </div>
    </a>`;
  }).join('');
});
</script>
</body>
</html>
